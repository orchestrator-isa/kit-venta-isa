services:
  - type: web
    name: isa-chatcommerce
    runtime: python
    region: frankfurt
    plan: free
    rootDir: 06-BACKEND-SERVICIOS
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: isa-db
          property: connectionString
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: NEON_DB_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HUBSPOT_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: isa-db
    region: frankfurt
    plan: free
    ipAllowList: []
