<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Admin - Leads Scrap</title>
    <style>
        :root {
            --cyan: #00E5FF;
            --green: #00FF88;
            --gold: #FFD700;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--gray);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0,229,255,0.2);
        }
        .stat-card h3 {
            color: var(--cyan);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--green);
        }
        .leads-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--gray);
            border-radius: 12px;
            overflow: hidden;
        }
        .leads-table th {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .leads-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .leads-table tr:hover {
            background: rgba(0,229,255,0.05);
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-a { background: rgba(0,255,136,0.2); color: var(--green); }
        .badge-b { background: rgba(0,229,255,0.2); color: var(--cyan); }
        .badge-c { background: rgba(255,215,0,0.2); color: var(--gold); }
        .badge-d { background: rgba(255,100,100,0.2); color: #ff6464; }
        .btn {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: var(--dark);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn:hover { opacity: 0.9; }
        .loading { text-align: center; padding: 40px; color: var(--cyan); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 ISA ChatCommerce - Panel Admin</h1>
        <p>Leads Scrap | Tetuán, Marruecos</p>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>Total Leads</h3>
                <div class="value" id="total-leads">-</div>
            </div>
            <div class="stat-card">
                <h3>Sin Contactar</h3>
                <div class="value" id="sin-contactar">-</div>
            </div>
            <div class="stat-card">
                <h3>Casos A (Premium)</h3>
                <div class="value" id="casos-a">-</div>
            </div>
            <div class="stat-card">
                <h3>Clientes Activos</h3>
                <div class="value" id="clientes-activos">-</div>
            </div>
        </div>

        <table class="leads-table">
            <thead>
                <tr>
                    <th>Caso</th>
                    <th>Negocio</th>
                    <th>Teléfono</th>
                    <th>Tipo</th>
                    <th>Pack</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="leads-body">
                <tr><td colspan="8" class="loading">Cargando leads...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function cargarLeads() {
            try {
                const res = await fetch(`${API_URL}/clientes/leads/scrap`);
                const data = await res.json();

                document.getElementById('total-leads').textContent = data.length;
                document.getElementById('sin-contactar').textContent = data.filter(l => l.estado_contacto === 'no_contactado').length;
                document.getElementById('casos-a').textContent = data.filter(l => l.caso === 'A').length;

                const tbody = document.getElementById('leads-body');
                tbody.innerHTML = data.map(lead => `
                    <tr>
                        <td><span class="badge badge-${lead.caso?.toLowerCase() || 'd'}">${lead.caso || '?'}</span></td>
                        <td><strong>${lead.nombre_negocio || 'N/A'}</strong><br><small>${lead.nombre || ''}</small></td>
                        <td><a href="https://wa.me/${lead.telefono?.replace('+', '')}" target="_blank">${lead.telefono}</a></td>
                        <td>${lead.tipo_negocio || '-'}</td>
                        <td>${lead.pack_asignado || '-'}</td>
                        <td>${lead.estado_contacto}</td>
                        <td>${new Date(lead.fecha_scrap).toLocaleDateString('es-ES')}</td>
                        <td><button class="btn" onclick="copiarMensaje('${lead.telefono}')">📋 Mensaje</button></td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('leads-body').innerHTML = 
                    `<tr><td colspan="8" class="loading">Error cargando datos: ${e.message}</td></tr>`;
            }
        }

        async function cargarClientes() {
            try {
                const res = await fetch(`${API_URL}/clientes/?estado=activo`);
                const data = await res.json();
                document.getElementById('clientes-activos').textContent = data.length;
            } catch (e) {
                document.getElementById('clientes-activos').textContent = '0';
            }
        }

        function copiarMensaje(telefono) {
            alert(`Mensaje copiado para ${telefono}`);
        }

        cargarLeads();
        cargarClientes();
    </script>
</body>
</html>
