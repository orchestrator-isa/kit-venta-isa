<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Admin - Leads</title>
    <style>
        :root {
            --cyan: #00E5FF;
            --green: #00FF88;
            --gold: #FFD700;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
            --red: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.6rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 4px;
        }
        .header p { opacity: 0.9; font-size: 0.9rem; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--gray);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0,229,255,0.15);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card h3 {
            color: var(--cyan);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--green);
        }
        .leads-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--gray);
            border-radius: 12px;
            overflow: hidden;
            font-size: 0.9rem;
        }
        .leads-table th {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            padding: 14px 12px;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .leads-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .leads-table tr:hover {
            background: rgba(0,229,255,0.05);
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }
        .badge-a { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid var(--green); }
        .badge-b { background: rgba(0,229,255,0.15); color: var(--cyan); border: 1px solid var(--cyan); }
        .badge-c { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid var(--gold); }
        .badge-d { background: rgba(255,100,100,0.15); color: var(--red); border: 1px solid var(--red); }
        .btn {
            background: linear-gradient(135deg, var(--cyan), var(--green));
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            color: var(--dark);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { opacity: 0.9; }
        .loading, .error, .empty {
            text-align: center;
            padding: 40px;
            color: var(--cyan);
        }
        .error { color: var(--red); }
        .empty { color: #888; }
        .wa-link {
            color: var(--green);
            text-decoration: none;
        }
        .wa-link:hover { text-decoration: underline; }
        .refresh-btn {
            background: var(--gray);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
        .refresh-btn:hover { background: rgba(0,229,255,0.1); }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🚀 ISA ChatCommerce</h1>
        <p>Panel Admin | Tetuán, Marruecos</p>
    </div>

    <div class="container">
        <button class="refresh-btn" onclick="cargarTodo()">🔄 Actualizar</button>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Leads</h3>
                <div class="value" id="total-leads">-</div>
            </div>
            <div class="stat-card">
                <h3>Sin Contactar</h3>
                <div class="value" id="sin-contactar">-</div>
            </div>
            <div class="stat-card">
                <h3>Casos A</h3>
                <div class="value" id="casos-a">-</div>
            </div>
            <div class="stat-card">
                <h3>Clientes Activos</h3>
                <div class="value" id="clientes-activos">-</div>
            </div>
        </div>

        <table class="leads-table">
            <thead>
                <tr>
                    <th>Caso</th>
                    <th>Negocio</th>
                    <th>Teléfono</th>
                    <th>Tipo</th>
                    <th>Pack</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="leads-body">
                <tr><td colspan="8" class="loading">Cargando leads...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function cargarTodo() {
            await cargarLeads();
            await cargarClientes();
        }

        async function cargarLeads() {
            const tbody = document.getElementById('leads-body');
            tbody.innerHTML = '<tr><td colspan="8" class="loading">Cargando leads...</td></tr>';

            try {
                const res = await fetch(`${API_URL}/api/leads`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();

                // Verificar que data sea array
                if (!Array.isArray(data)) {
                    throw new Error("Respuesta no es array: " + JSON.stringify(data).slice(0, 100));
                }

                document.getElementById('total-leads').textContent = data.length;
                document.getElementById('sin-contactar').textContent = data.filter(l => l.estado_contacto === 'no_contactado').length;
                document.getElementById('casos-a').textContent = data.filter(l => l.caso === 'A' || l.caso === 'a').length;

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty">No hay leads registrados</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(lead => {
                    const casoClass = 'badge-' + (lead.caso?.toLowerCase() || 'd');
                    const fecha = lead.fecha_scrap ? new Date(lead.fecha_scrap).toLocaleDateString('es-ES') : '-';
                    const waNumber = (lead.telefono || '').replace(/\D/g, '');

                    return `<tr>
                        <td><span class="badge ${casoClass}">${lead.caso || '?'}</span></td>
                        <td><strong>${escapeHtml(lead.nombre_negocio || 'N/A')}</strong><br><small>${escapeHtml(lead.nombre || '')}</small></td>
                        <td><a href="https://wa.me/${waNumber}" target="_blank" class="wa-link">${lead.telefono || '-'}</a></td>
                        <td>${escapeHtml(lead.tipo_negocio || '-')}</td>
                        <td>${escapeHtml(lead.pack_asignado || '-')}</td>
                        <td>${escapeHtml(lead.estado_contacto || '-')}</td>
                        <td>${fecha}</td>
                        <td><a class="btn" href="https://wa.me/${waNumber}" target="_blank">💬 WhatsApp</a></td>
                    </tr>`;
                }).join('');

            } catch (e) {
                console.error('Error:', e);
                tbody.innerHTML = `<tr><td colspan="8" class="error">❌ Error: ${escapeHtml(e.message)}<br><small>Verifica que el endpoint /api/leads exista</small></td></tr>`;
            }
        }

        async function cargarClientes() {
            try {
                const res = await fetch(`${API_URL}/api/clientes`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                document.getElementById('clientes-activos').textContent = Array.isArray(data) ? data.length : '?';
            } catch (e) {
                document.getElementById('clientes-activos').textContent = '?';
                console.error('Error clientes:', e);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Cargar al iniciar
        cargarTodo();
    </script>
</body>
</html>
